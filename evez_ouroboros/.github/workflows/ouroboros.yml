name: Ouroboros Daily Cycle
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r evez_ouroboros/requirements.txt
      - name: Run Ouroboros Cycle
        env:
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY:            ${{ secrets.OPENAI_API_KEY }}
          PERPLEXITY_API_KEY:        ${{ secrets.PERPLEXITY_API_KEY }}
          ALL_IMAGES_API_KEY:        ${{ secrets.ALL_IMAGES_API_KEY }}
          ELEVENLABS_API_KEY:        ${{ secrets.ELEVENLABS_API_KEY }}
          CLOUDCONVERT_API_KEY:      ${{ secrets.CLOUDCONVERT_API_KEY }}
          CONVERTAPI_SECRET:         ${{ secrets.CONVERTAPI_SECRET }}
          ALCHEMY_API_KEY:           ${{ secrets.ALCHEMY_API_KEY }}
          ALCHEMY_ENTROPIC_CONTRACT: ${{ secrets.ALCHEMY_ENTROPIC_CONTRACT }}
          ALCHEMY_VOID_CONTRACT:     ${{ secrets.ALCHEMY_VOID_CONTRACT }}
          ALCHEMY_CHRONO_CONTRACT:   ${{ secrets.ALCHEMY_CHRONO_CONTRACT }}
          STRIPE_SECRET_KEY:         ${{ secrets.STRIPE_SECRET_KEY }}
          ABLY_API_KEY:              ${{ secrets.ABLY_API_KEY }}
          CLARITY_PROJECT_ID:        ${{ secrets.CLARITY_PROJECT_ID }}
          MEM0_API_KEY:              ${{ secrets.MEM0_API_KEY }}
          GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN:              ${{ secrets.VERCEL_TOKEN }}
          EVEZ_BASE_URL:             ${{ secrets.EVEZ_BASE_URL }}
          MIRO_ACCESS_TOKEN:         ${{ secrets.MIRO_ACCESS_TOKEN }}
          VAPI_API_KEY:              ${{ secrets.VAPI_API_KEY }}
          DEEPGRAM_API_KEY:          ${{ secrets.DEEPGRAM_API_KEY }}
          HYPERBROWSER_API_KEY:      ${{ secrets.HYPERBROWSER_API_KEY }}
          AGENTMAIL_API_KEY:         ${{ secrets.AGENTMAIL_API_KEY }}
        run: cd evez_ouroboros && python -m core.ouroboros_controller
      - name: Self-healing on failure
        if: failure()
        run: |
          echo "Cycle failed $(date)" >> state/error_log.txt
          python evez_ouroboros/scripts/emergency_recovery.py || true
          git config user.name "Ouroboros"
          git config user.email "ouroboros@evez.art"
          git add state/
          git commit -m "Self-heal: $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
          git push || true
      - name: Deploy to Vercel
        if: success()
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
